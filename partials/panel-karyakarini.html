<h2 class="section-title">जिल्हा → नगर → उपनगर कार्यकारिणी</h2>
<p class="section-note eng">Filter by Nagar and Upnagar within the selected Jilha</p>
<div class="filter-row">
  <select id="nagarFilter"><option value="All">सर्व नगर</option></select>
  <select id="upnagarFilter"><option value="All">सर्व उपनगर</option></select>
  <select id="karyakariniYearFilter"><option value="All">सर्व शैक्षणिक वर्ष</option></select>
  <button type="button" class="add-toggle-btn" id="toggleAddKaryakarini">+ नवीन नोंद जोडा</button>
</div>
<form id="addKaryakariniForm" class="add-form">
  <div class="grid">
    <select id="addKJilha" required></select>
    <select id="addKNagar" required></select>
    <input type="text" id="addKUpnagar" placeholder="उपनगर">
    <input type="text" id="addKName" placeholder="नाव" required>
    <input type="text" id="addKJababdari" placeholder="जबाबदारी" required>
    <input type="tel" id="addKPhone" placeholder="फोन">
    <input type="email" id="addKEmail" placeholder="ईमेल">
    <select id="addKAcademicYear"></select>
  </div>
  <button type="submit" class="btn">जतन करा</button>
  <div class="add-form-msg" id="addKMsg"></div>
</form>
<div id="karyakariniTableWrap"></div>
