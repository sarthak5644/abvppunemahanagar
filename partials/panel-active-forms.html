<h2 class="section-title">Active Forms</h2>
<p class="section-note eng">Live registration / event forms for the selected Jilha</p>
<div class="filter-row">
  <button type="button" class="add-toggle-btn" id="toggleAddActiveForm">+ नवीन Form जोडा</button>
</div>
<form id="addActiveFormForm" class="add-form">
  <div class="grid">
    <input type="text" id="addAFName" placeholder="Form Name" required>
    <select id="addAFJilha" required></select>
    <input type="date" id="addAFDate" required>
    <input type="text" id="addAFLink" placeholder="Form Link (URL)">
    <select id="addAFStatus">
      <option value="Active">Active</option>
      <option value="Completed">Completed</option>
      <option value="Cancelled">Cancelled</option>
      <option value="Postponed">Postponed</option>
    </select>
  </div>
  <button type="submit" class="btn">जतन करा</button>
  <div class="add-form-msg" id="addAFMsg"></div>
</form>
<div id="activeFormsWrap"></div>
