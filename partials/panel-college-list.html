<h2 class="section-title">भाग-wise College List</h2>
<p class="section-note eng">All colleges under the selected Jilha</p>
<div class="filter-row">
  <select id="collegeListJilhaFilter"><option value="All">महानगर</option></select>
  <select id="collegeListNagarFilter"><option value="All">सर्व नगर</option></select>
  <button type="button" class="add-toggle-btn" id="toggleAddCollegeList">+ नवीन College जोडा</button>
</div>
<form id="addCollegeListForm" class="add-form">
  <div class="grid">
    <select id="addCLJilha" required></select>
    <select id="addCLNagar" required></select>
    <input type="text" id="addCLName" placeholder="College Name" required>
    <input type="text" id="addCLAddress" placeholder="Address">
    <input type="text" id="addCLPrincipal" placeholder="Principal">
    <input type="tel" id="addCLContact" placeholder="Contact">
  </div>
  <button type="submit" class="btn">जतन करा</button>
  <div class="add-form-msg" id="addCLMsg"></div>
</form>
<div id="collegeListTableWrap"></div>
