<div id="loginScreen">
  <div class="login-card">
    <h1>पुणे महानगर डॅशबोर्ड</h1>
    <div class="sub eng">Authorised Access Only</div>
    <form id="loginForm">
      <div class="login-field">
        <label for="loginEmail">ईमेल</label>
        <input type="email" id="loginEmail" required autocomplete="username" placeholder="you@example.com">
      </div>
      <div class="login-field">
        <label for="loginPassword">पासवर्ड</label>
        <div class="pw-wrap">
          <input type="password" id="loginPassword" required autocomplete="current-password" placeholder="••••••••">
          <button type="button" class="pw-toggle" id="togglePw">दाखवा</button>
        </div>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">प्रवेश करा</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>
